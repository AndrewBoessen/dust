name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  ELIXIR_VERSION: "1.19.0"
  OTP_VERSION: "28.1"
  GO_VERSION: "1.22"
  MIX_ENV: prod

jobs:
  # ── Server Release: Linux x86_64 ─────────────────────────────────────
  build-server-linux-x86_64:
    name: Server — Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: server-linux-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-linux-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-linux-x86_64.tar.gz dust/
          mv dust-server-linux-x86_64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-linux-x86_64
          path: dust-server-linux-x86_64.tar.gz

  # ── Server Release: Linux aarch64 ────────────────────────────────────
  build-server-linux-aarch64:
    name: Server — Linux aarch64
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: server-linux-aarch64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-linux-aarch64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-linux-aarch64.tar.gz dust/
          mv dust-server-linux-aarch64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-linux-aarch64
          path: dust-server-linux-aarch64.tar.gz

  # ── Server Release: macOS x86_64 ─────────────────────────────────────
  build-server-macos-x86_64:
    name: Server — macOS x86_64
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: brew install snappy

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: server-macos-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-macos-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-macos-x86_64.tar.gz dust/
          mv dust-server-macos-x86_64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-macos-x86_64
          path: dust-server-macos-x86_64.tar.gz

  # ── Server Release: macOS aarch64 ────────────────────────────────────
  build-server-macos-aarch64:
    name: Server — macOS aarch64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: brew install snappy

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: server-macos-aarch64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-macos-aarch64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-macos-aarch64.tar.gz dust/
          mv dust-server-macos-aarch64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-macos-aarch64
          path: dust-server-macos-aarch64.tar.gz

  # ── Server Release: Windows x86_64 ───────────────────────────────────
  build-server-windows-x86_64:
    name: Server — Windows x86_64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install vcpkg dependencies
        run: |
          vcpkg install snappy:x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: server-windows-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-windows-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          $env:CGO_ENABLED="0"
          go build -ldflags="-s -w" -o tsnet_sidecar.exe
        shell: pwsh

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build\prod\rel
          Compress-Archive -Path dust -DestinationPath dust-server-windows-x86_64.zip
          Move-Item dust-server-windows-x86_64.zip ..\..\..\
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-windows-x86_64
          path: dust-server-windows-x86_64.zip

  # ── CLI Binary: Linux & macOS (Burrito cross-compiles from Linux) ─────
  #
  # Burrito cross-compiles all non-Windows targets from a single Linux
  # runner, so we only need one job for Linux + macOS CLI binaries.
  build-cli-unix:
    name: CLI — Linux & macOS
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # Burrito needs Go to build its self-extractor
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Burrito uses zig for cross-compilation
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: cli-unix-${{ hashFiles('**/mix.lock') }}
          restore-keys: cli-unix-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build CLI binaries
        working-directory: apps/dust_cli
        run: mix release dustctl
        env:
          BURRITO_TARGET: linux_x86_64,linux_aarch64,macos_x86_64,macos_aarch64

      - name: Upload Linux x86_64 CLI
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-linux-x86_64
          path: apps/dust_cli/burrito_out/dustctl_linux_x86_64

      - name: Upload Linux aarch64 CLI
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-linux-aarch64
          path: apps/dust_cli/burrito_out/dustctl_linux_aarch64

      - name: Upload macOS x86_64 CLI
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-macos-x86_64
          path: apps/dust_cli/burrito_out/dustctl_macos_x86_64

      - name: Upload macOS aarch64 CLI
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-macos-aarch64
          path: apps/dust_cli/burrito_out/dustctl_macos_aarch64

  # ── CLI Binary: Windows (must build natively on Windows) ─────────────
  build-cli-windows:
    name: CLI — Windows x86_64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/prod
          key: cli-windows-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: cli-windows-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build CLI binary
        working-directory: apps/dust_cli
        run: mix release dustctl
        env:
          BURRITO_TARGET: windows_x86_64

      - name: Upload Windows CLI
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-windows-x86_64
          path: apps/dust_cli/burrito_out/dustctl_windows_x86_64.exe

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-server-linux-x86_64
      - build-server-linux-aarch64
      - build-server-macos-x86_64
      - build-server-macos-aarch64
      - build-server-windows-x86_64
      - build-cli-unix
      - build-cli-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Dust ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/dust-server-linux-x86_64.tar.gz
            artifacts/dust-server-linux-aarch64.tar.gz
            artifacts/dust-server-macos-x86_64.tar.gz
            artifacts/dust-server-macos-aarch64.tar.gz
            artifacts/dust-server-windows-x86_64.zip
            artifacts/dustctl-linux-x86_64
            artifacts/dustctl-linux-aarch64
            artifacts/dustctl-macos-x86_64
            artifacts/dustctl-macos-aarch64
            artifacts/dustctl-windows-x86_64.exe
            artifacts/SHA256SUMS.txt
