name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  ELIXIR_VERSION: "1.19.0"
  OTP_VERSION: "28.1"
  GO_VERSION: "1.22"
  MIX_ENV: prod

jobs:
  # ── Server Release: Linux x86_64 ─────────────────────────────────────
  build-server-linux-x86_64:
    name: Server — Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: server-linux-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-linux-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Copy sidecar to priv
        run: |
          mkdir -p apps/dust_bridge/priv
          cp apps/dust_bridge/native/tsnet_sidecar/tsnet_sidecar apps/dust_bridge/priv/tsnet_sidecar
          chmod +x apps/dust_bridge/priv/tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-linux-x86_64.tar.gz dust/
          mv dust-server-linux-x86_64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-linux-x86_64
          path: dust-server-linux-x86_64.tar.gz

  # ── Server Release: Linux aarch64 ────────────────────────────────────
  build-server-linux-aarch64:
    name: Server — Linux aarch64
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: server-linux-aarch64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-linux-aarch64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Copy sidecar to priv
        run: |
          mkdir -p apps/dust_bridge/priv
          cp apps/dust_bridge/native/tsnet_sidecar/tsnet_sidecar apps/dust_bridge/priv/tsnet_sidecar
          chmod +x apps/dust_bridge/priv/tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-linux-aarch64.tar.gz dust/
          mv dust-server-linux-aarch64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-linux-aarch64
          path: dust-server-linux-aarch64.tar.gz

  # ── Server Release: macOS x86_64 ─────────────────────────────────────
  build-server-macos-x86_64:
    name: Server — macOS x86_64
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: brew install snappy

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: server-macos-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-macos-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Copy sidecar to priv
        run: |
          mkdir -p apps/dust_bridge/priv
          cp apps/dust_bridge/native/tsnet_sidecar/tsnet_sidecar apps/dust_bridge/priv/tsnet_sidecar
          chmod +x apps/dust_bridge/priv/tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-macos-x86_64.tar.gz dust/
          mv dust-server-macos-x86_64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-macos-x86_64
          path: dust-server-macos-x86_64.tar.gz

  # ── Server Release: macOS aarch64 ────────────────────────────────────
  build-server-macos-aarch64:
    name: Server — macOS aarch64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: brew install snappy

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: server-macos-aarch64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-macos-aarch64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          CGO_ENABLED=0 go build -ldflags="-s -w" -o tsnet_sidecar
          chmod +x tsnet_sidecar

      - name: Copy sidecar to priv
        run: |
          mkdir -p apps/dust_bridge/priv
          cp apps/dust_bridge/native/tsnet_sidecar/tsnet_sidecar apps/dust_bridge/priv/tsnet_sidecar
          chmod +x apps/dust_bridge/priv/tsnet_sidecar

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build/prod/rel
          tar -czf dust-server-macos-aarch64.tar.gz dust/
          mv dust-server-macos-aarch64.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-macos-aarch64
          path: dust-server-macos-aarch64.tar.gz

  # ── Server Release: Windows x86_64 ───────────────────────────────────
  build-server-windows-x86_64:
    name: Server — Windows x86_64
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install vcpkg dependencies
        run: |
          vcpkg install snappy:x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: server-windows-x86_64-${{ hashFiles('**/mix.lock') }}
          restore-keys: server-windows-x86_64-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build Go sidecar
        run: |
          cd apps/dust_bridge/native/tsnet_sidecar
          $env:CGO_ENABLED="0"
          go build -ldflags="-s -w" -o tsnet_sidecar.exe
        shell: pwsh

      - name: Copy sidecar to priv
        run: |
          New-Item -ItemType Directory -Force -Path apps/dust_bridge/priv | Out-Null
          Copy-Item apps/dust_bridge/native/tsnet_sidecar/tsnet_sidecar.exe apps/dust_bridge/priv/tsnet_sidecar.exe
        shell: pwsh

      - name: Build server release
        run: mix release dust --overwrite

      - name: Package server release
        run: |
          cd _build\prod\rel
          Compress-Archive -Path dust -DestinationPath dust-server-windows-x86_64.zip
          Move-Item dust-server-windows-x86_64.zip ..\..\..\
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-server-windows-x86_64
          path: dust-server-windows-x86_64.zip

  # ── CLI Binaries: Matrix across all platforms ─────────────────────────
  #
  # Each target builds natively on its own runner — no cross-compilation
  # needed. GitHub waits for all matrix legs before proceeding to the
  # release job.
  build-cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux_x86_64
            runner: ubuntu-22.04
            artifact_ext: ""
            sys_deps: |
              sudo apt-get update
              sudo apt-get install -y xz-utils
          - target: linux_aarch64
            runner: ubuntu-22.04-arm
            artifact_ext: ""
            sys_deps: |
              sudo apt-get update
              sudo apt-get install -y xz-utils
          - target: macos_x86_64
            runner: macos-15-intel
            artifact_ext: ""
            sys_deps: brew install xz
          - target: macos_aarch64
            runner: macos-14
            artifact_ext: ""
            sys_deps: brew install xz
          - target: windows_x86_64
            runner: windows-2022
            artifact_ext: ".exe"
            sys_deps: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      # MSVC is required on Windows so Burrito's Zig wrapper compiles correctly
      - name: Set up MSVC environment (Windows only)
        if: matrix.target == 'windows_x86_64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install system dependencies
        if: matrix.sys_deps != ''
        run: ${{ matrix.sys_deps }}
        shell: bash

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: cli-${{ matrix.target }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: cli-${{ matrix.target }}-

      - name: Install Elixir dependencies
        run: mix deps.get --only prod

      - name: Build CLI binary
        working-directory: apps/dust_cli
        run: mix release dustctl --overwrite
        env:
          BURRITO_TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dustctl-${{ matrix.target }}
          path: apps/dust_cli/burrito_out/dustctl_${{ matrix.target }}${{ matrix.artifact_ext }}

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-server-linux-x86_64
      - build-server-linux-aarch64
      - build-server-macos-x86_64
      - build-server-macos-aarch64
      - build-server-windows-x86_64
      - build-cli
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Dust ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/dust-server-linux-x86_64.tar.gz
            artifacts/dust-server-linux-aarch64.tar.gz
            artifacts/dust-server-macos-x86_64.tar.gz
            artifacts/dust-server-macos-aarch64.tar.gz
            artifacts/dust-server-windows-x86_64.zip
            artifacts/dustctl_linux_x86_64
            artifacts/dustctl_linux_aarch64
            artifacts/dustctl_macos_x86_64
            artifacts/dustctl_macos_aarch64
            artifacts/dustctl_windows_x86_64.exe
            artifacts/SHA256SUMS.txt
